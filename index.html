<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>한모금 (A Sip)</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Splash Screen -->
    <div id="view-splash" class="splash-screen">
        <div class="splash-text">당신의 한모금을 기억하는 방법</div>
    </div>

    <!-- Sidebar Overlay -->
    <div id="sidebar-overlay" class="sidebar-overlay hidden"></div>
    
    <!-- Sidebar Navigation -->
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>메뉴</h2>
            <button id="btn-close-sidebar" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <ul class="sidebar-menu">
            <li id="nav-register-menu"><i class="fa-solid fa-camera"></i> 사전 메뉴판 등록하기</li>
        </ul>
    </nav>

    <!-- Main Application -->
    <div id="app-container" class="hidden">
        <!-- Header -->
        <header id="app-header">
            <div class="header-left">
                <button id="btn-menu" class="icon-btn"><i class="fa-solid fa-bars"></i></button>
                <button id="btn-back" class="icon-btn hidden"><i class="fa-solid fa-chevron-left"></i></button>
            </div>
            <h1 id="header-title">한모금</h1>
            <div class="header-right"></div>
        </header>

        <main id="app-main">
            <!-- 1. Home View (Feed) -->
            <section id="view-home" class="view active">
                <div id="empty-state" class="empty-state">
                    <p>아직 기록된 한모금이 없습니다.</p>
                    <p>하단의 + 버튼을 눌러 첫 카페를 기록해 보세요.</p>
                </div>
                
                <div id="feed-list" class="feed-section hidden">
                    <!-- Cafe Cards will be injected here -->
                </div>
                
                <!-- Floating Action Button -->
                <button id="btn-fab" class="fab"><i class="fa-solid fa-plus"></i></button>
            </section>

            <!-- 2. Add Record View -->
            <section id="view-add" class="view hidden">
                <div class="add-container">
                    <div class="input-group">
                        <label>카페 이름 (필수)</label>
                        <input type="text" id="input-cafe-name" class="text-input" placeholder="어느 카페를 방문하셨나요?">
                    </div>

                    <div class="input-group">
                        <label>메뉴명 (필수)</label>
                        <input type="text" id="input-cafe-menu" class="text-input" placeholder="어떤 메뉴를 드셨나요?">
                        <div id="extracted-menu-chips" class="chips-container hidden">
                            <!-- Pre-extracted menu chips injected here -->
                        </div>
                    </div>

                    <div class="input-group">
                        <label>내가 마신 메뉴 사진 (선택)</label>
                        <label class="upload-box" for="input-my-photo" id="label-my-photo">
                            <i class="fa-solid fa-camera"></i>
                            <span id="photo-my-text">사진 업로드</span>
                        </label>
                        <input type="file" id="input-my-photo" accept="image/*" style="display:none;">
                    </div>

                    <div class="input-group">
                        <label>당신의 한모금 기록하기 (필수)</label>
                        <textarea id="input-review" class="text-area" placeholder="카페에서 느낀 오늘의 기분, 한줄평을 적어주세요."></textarea>
                    </div>

                    <button id="btn-submit" class="btn-primary" disabled>기록 완료</button>
                </div>
            </section>

            <!-- 3. Cafe Detail View -->
            <section id="view-detail" class="view hidden">
                <div class="cafe-header">
                    <h2 id="detail-cafe-name">카페 이름</h2>
                    <p id="detail-cafe-count" class="cafe-count-subtitle">총 N번 방문했어요</p>
                </div>
                
                <div class="timeline" id="detail-timeline">
                    <!-- Timeline records injected here -->
                </div>
            </section>

            <!-- 4. Register Menu View (Sidebar OCR Flow) -->
            <section id="view-register" class="view hidden">
                <div class="add-container">
                    <div class="welcome-section" style="margin-bottom: 0;">
                        <h2>사전 메뉴판 등록</h2>
                        <p>메뉴판을 미리 찍어두면 기록할 때 편하게 고를 수 있어요.</p>
                    </div>

                    <div class="input-group">
                        <label>어느 카페의 메뉴판인가요? (필수)</label>
                        <input type="text" id="input-register-cafe-name" class="text-input" placeholder="카페 이름을 입력하세요">
                    </div>

                    <div class="input-group">
                        <label>메뉴판 사진 업로드</label>
                        <label class="upload-box" for="input-register-photo" id="label-register-photo">
                            <i class="fa-solid fa-camera"></i>
                            <span>메뉴판 사진 업로드</span>
                        </label>
                        <input type="file" id="input-register-photo" accept="image/*" style="display:none;">
                    </div>

                    <div id="loading-ocr" class="hidden">
                        <div class="spinner"></div>
                        <p id="ocr-status-text">AI가 메뉴를 읽고 있어요...<br><span style="font-size:0.8rem; color:var(--text-secondary)">(최대 10초 소요)</span></p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Toast Message -->
    <div id="toast" class="toast hidden">메시지</div>

    <script src="app.js"></script>
</body>
</html>
